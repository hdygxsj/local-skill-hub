name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Build and publish
  build-and-publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Build web
        run: |
          cd web
          npm install
          npm run build

      - name: Prepare CLI
        run: |
          cp -r web/dist internal/cli/dist

      - name: Build CLI
        run: |
          mkdir -p releases/bin
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o releases/bin/easy-skills-cli-macos-aarch64 ./cmd/easy-skills

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          files: releases/bin/easy-skills-cli-macos-aarch64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare npm package
        run: |
          mkdir -p npm/bin
          cp releases/bin/easy-skills-cli-macos-aarch64 npm/bin/easy-skills
          chmod +x npm/bin/easy-skills

      - name: Publish npm
        run: cd npm && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
